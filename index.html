<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Mini Social</title>
  <link rel="stylesheet" href="css/style.css">
  <link href=https://i.pinimg.com/1200x/d7/33/b6/d733b6487160b1c1ed0c6f36c9399993.jpg>
</head>
<body>

<header>
  <h1 class="logo">Mini Social</h1>
</header>

<main class="feed">

  <article class="post">
    <div class="post-header">
      <img src="assets/profile.png" class="avatar">
      <div>
        <span class="name">mariluz</span>
        <span class="username">@mariluzx</span>
      </div>
    </div>

    <p class="post-text">
     O terceiro 1 é o melhor
    </p>

    <div class="post-actions">
      <button id="likeBtn">Curtir</button>
      <span id="likeCount">0</span>
    </div>

    <section class="comments">
      <div class="comment">
        <img src="assets/avatar.png" class="avatar-small">
        <p>Eles são 10!</p>
      </div>

      <div class="comment">
        <img src="assets/avatar.png" class="avatar-small">
        <p>Os ++</p>
      </div>
    </section>

  </article>

</main>

<script src="js/script.js"></script>
</body>
</html>
